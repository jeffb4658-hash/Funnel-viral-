name: Autonomous Content Engine

on:
  schedule:
    # Runs automatically every day at 12:00 PM UTC (7:00 AM CST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to trigger it manually from your tablet for testing

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install openai

      - name: Run AI Generator Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_content.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "Titan-Automation-Bot"
          git config --global user.user.email "automation@titan.local"
          git add content/*.md
          # Only commit if new content was actually generated to prevent errors
          git diff-index --quiet HEAD || git commit -m "Automated Content Update [skip ci]"
          git push
